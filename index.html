<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Holi Experience</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background: #050505;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Full screen interactive background */
        #canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }

        .card-container {
            position: relative;
            z-index: 10;
            perspective: 1000px;
        }

        .card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px 40px;
            width: 340px;
            text-align: center;
            color: white;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transition: transform 0.1s ease-out;
            pointer-events: auto;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            background: linear-gradient(45deg, #ff00cc, #3333ff, #00ffcc, #ffcc00);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: flow 5s linear infinite;
        }

        @keyframes flow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        p {
            font-weight: 300;
            line-height: 1.6;
            margin: 25px 0;
            color: #ddd;
        }

        .btn-splash {
            background: white;
            color: #000;
            border: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(255, 0, 204, 0.3);
        }

        .btn-splash:hover {
            transform: scale(1.1) rotate(-2deg);
            background: #ff00cc;
            color: white;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="card-container" id="tilt-container">
        <div class="card" id="card">
            <div style="font-size: 0.7rem; letter-spacing: 4px; margin-bottom: 10px;">FESTIVAL OF COLORS</div>
            <h1>HOLI</h1>
            <p>Touch the screen to spray colors, or hit the button below for a surprise explosion!</p>
            
            <button class="btn-splash" onclick="explode()">Splash Color!</button>
            
            <div class="footer">
                Crafted by <br>
                <strong style="font-size: 1.2rem; color: #fff;">Spandan</strong>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const colors = ['#FF00CC', '#3333FF', '#00FFCC', '#FFCC00', '#FF5722'];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color, velocity) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.velocity = velocity;
                this.alpha = 1;
                this.size = Math.random() * 5 + 2;
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            update() {
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= 0.01;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(5, 5, 5, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach((p, i) => {
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                } else {
                    p.update();
                    p.draw();
                }
            });
        }

        // Add particles on move
        window.addEventListener('mousemove', (e) => {
            for (let i = 0; i < 2; i++) {
                particles.push(new Particle(e.clientX, e.clientY, colors[Math.floor(Math.random() * colors.length)], {
                    x: (Math.random() - 0.5) * 5,
                    y: (Math.random() - 0.5) * 5
                }));
            }
        });

        // Explosion Function
        function explode() {
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            for (let i = 0; i < 150; i++) {
                particles.push(new Particle(centerX, centerY, colors[Math.floor(Math.random() * colors.length)], {
                    x: (Math.random() - 0.5) * 15,
                    y: (Math.random() - 0.5) * 15
                }));
            }
        }

        // 3D Tilt Effect
        const card = document.getElementById('card');
        window.addEventListener('mousemove', (e) => {
            let x = (window.innerWidth / 2 - e.clientX) / 20;
            let y = (window.innerHeight / 2 - e.clientY) / 20;
            card.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        });

        animate();
    </script>
</body>
</html>
